<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Germany & Austria Memories</title>
  <style>
    :root { --bg1:#fbf5ed; --bg2:#eadfd3; --text:#2f2924; --muted:#81766f; --accent:#9b6a4a; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      color:var(--text); background:radial-gradient(circle at top left,#fffaf3 0,transparent 35%),linear-gradient(135deg,var(--bg1),var(--bg2));
      padding:28px 18px 48px;
    }
    header { max-width:920px; margin:0 auto 24px; text-align:center; }
    .eyebrow { color:var(--accent); font-weight:700; letter-spacing:.08em; font-size:13px; text-transform:uppercase; }
    h1 { margin:8px 0 10px; font-size:clamp(30px,7vw,54px); line-height:1.05; }
    .subtitle { margin:0 auto; max-width:560px; color:var(--muted); line-height:1.7; font-size:16px; }
    .toolbar { max-width:920px; margin:22px auto 18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    button { border:0; border-radius:999px; padding:11px 16px; background:rgba(255,255,255,.76); color:var(--text); box-shadow:0 8px 24px rgba(72,49,32,.10); cursor:pointer; font-size:14px; }
    button.active { background:var(--accent); color:#fff; }
    .gallery { max-width:920px; margin:0 auto; columns:3 220px; column-gap:16px; }
    .photo-card { break-inside:avoid; margin:0 0 16px; background:rgba(255,255,255,.82); border-radius:22px; padding:10px 10px 14px; box-shadow:0 14px 40px rgba(75,50,30,.13); cursor:pointer; transform:rotate(var(--r)); transition:.2s ease; }
    .photo-card:hover { transform:rotate(0deg) translateY(-3px); box-shadow:0 18px 48px rgba(75,50,30,.18); }
    .photo-card img { width:100%; display:block; border-radius:16px; background:#eee; }
    .photo-name { margin:10px 6px 0; color:var(--muted); font-size:13px; word-break:break-word; }
    .empty { max-width:520px; margin:36px auto; background:rgba(255,255,255,.75); border-radius:24px; padding:28px; text-align:center; color:var(--muted); line-height:1.7; box-shadow:0 14px 40px rgba(75,50,30,.10); }
    dialog { border:0; padding:0; border-radius:24px; background:transparent; width:min(94vw,860px); }
    dialog::backdrop { background:rgba(0,0,0,.68); backdrop-filter:blur(5px); }
    .lightbox { position:relative; background:#fff; border-radius:24px; padding:12px; box-shadow:0 20px 60px rgba(0,0,0,.30); }
    .lightbox img { width:100%; max-height:78vh; object-fit:contain; display:block; border-radius:18px; background:#eee; }
    .close { position:absolute; top:14px; right:14px; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.9); color:var(--text); }
    .footer { margin-top:28px; text-align:center; color:#9b9087; font-size:12px; }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">NFC Photo Gallery</div>
    <h1>Germany & Austria 2026</h1>
    <p class="subtitle">把照片直接拖進 GitHub 的 <strong>photos</strong> 資料夾，網站就會自動更新。NFC 永遠使用同一個網址。</p>
  </header>

  <div class="toolbar">
    <button id="newFirst" class="active">最新照片在前</button>
    <button id="oldFirst">最舊照片在前</button>
  </div>

  <main id="gallery" class="gallery"></main>
  <section id="empty" class="empty" hidden>目前還沒有照片。<br>請到 GitHub Repository 的 <strong>photos</strong> 資料夾，上傳 JPG、JPEG、PNG、WEBP 或 GIF 圖片。</section>

  <dialog id="dialog">
    <div class="lightbox">
      <button class="close" onclick="closeLightbox()">×</button>
      <img id="lightboxImage" alt="photo preview">
    </div>
  </dialog>

  <div class="footer">Made for one NFC, one link, many memories.</div>

  <script>
    const owner = "jueiyu0122";
    const repo = "hutopia-house-elf-kuokuo";
    const branch = "main";
    const photosFolder = "photos";

    let photos = [];
    let newestFirst = true;
    const gallery = document.getElementById("gallery");
    const empty = document.getElementById("empty");
    const dialog = document.getElementById("dialog");
    const lightboxImage = document.getElementById("lightboxImage");

    async function loadPhotos() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${photosFolder}?ref=${branch}`;
      const response = await fetch(apiUrl, { cache: "no-store" });
      if (!response.ok) { showEmpty(); return; }

      const files = await response.json();
      photos = files
        .filter(file => file.type === "file")
        .filter(file => /\.(jpg|jpeg|png|webp|gif)$/i.test(file.name))
        .map(file => ({
          name: file.name,
          url: `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${photosFolder}/${encodeURIComponent(file.name)}?v=${Date.now()}`
        }));

      render();
    }

    function render() {
      gallery.innerHTML = "";
      if (!photos.length) { showEmpty(); return; }

      empty.hidden = true;
      gallery.hidden = false;

      const sorted = [...photos].sort((a, b) =>
        newestFirst
          ? b.name.localeCompare(a.name, undefined, { numeric: true })
          : a.name.localeCompare(b.name, undefined, { numeric: true })
      );

      sorted.forEach((photo, index) => {
        const card = document.createElement("article");
        card.className = "photo-card";
        card.style.setProperty("--r", `${[-1.2,.8,-.4,1.1,-.8][index % 5]}deg`);

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = photo.url;
        img.alt = photo.name;

        const name = document.createElement("div");
        name.className = "photo-name";
        name.textContent = photo.name.replace(/\.(jpg|jpeg|png|webp|gif)$/i, "").replace(/[-_]/g, " ");

        card.appendChild(img);
        card.appendChild(name);
        card.addEventListener("click", () => openLightbox(photo.url));
        gallery.appendChild(card);
      });
    }

    function showEmpty() {
      gallery.hidden = true;
      empty.hidden = false;
    }

    function openLightbox(url) {
      lightboxImage.src = url;
      dialog.showModal();
    }

    function closeLightbox() {
      dialog.close();
      lightboxImage.src = "";
    }

    document.getElementById("newFirst").addEventListener("click", () => {
      newestFirst = true;
      document.getElementById("newFirst").classList.add("active");
      document.getElementById("oldFirst").classList.remove("active");
      render();
    });

    document.getElementById("oldFirst").addEventListener("click", () => {
      newestFirst = false;
      document.getElementById("oldFirst").classList.add("active");
      document.getElementById("newFirst").classList.remove("active");
      render();
    });

    loadPhotos();
  </script>
</body>
</html>
