<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NFC Photo Card</title>
  <meta name="description" content="A photo page for NFC tag" />
  <style>
    :root {
      --bg: #f7f3ee;
      --card: rgba(255,255,255,.82);
      --text: #2d2926;
      --muted: #766f69;
      --accent: #9b6a4a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff8ef 0, transparent 38%),
        linear-gradient(135deg, #f7f3ee, #efe3d7);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 440px);
      padding: 18px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(70, 45, 25, .16);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .photo-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      aspect-ratio: 4 / 5;
      background: #eee;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .25s ease;
    }

    h1 {
      margin: 18px 4px 8px;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: .02em;
    }

    p {
      margin: 0 4px 18px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button, a.button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
    }

    button.secondary {
      background: #e8ded5;
      color: var(--text);
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #9a9189;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="photo-wrap">
      <img id="mainPhoto" src="" alt="NFC photo" />
    </div>

    <h1 id="title">Loading...</h1>
    <p id="caption"></p>

    <div class="buttons">
      <button class="secondary" onclick="prevPhoto()">上一張</button>
      <button onclick="nextPhoto()">下一張</button>
    </div>

    <div class="hint">NFC 只需要寫入這個網站網址，之後換照片不用重寫 NFC。</div>
  </main>

  <script>
    let photos = [];
    let current = 0;

    async function loadPhotos() {
      const response = await fetch("./photos.json?ts=" + Date.now());
      const data = await response.json();
      photos = data.photos || [];

      const urlParams = new URLSearchParams(window.location.search);
      const selectedId = urlParams.get("photo");
      const selectedIndex = photos.findIndex(p => String(p.id) === selectedId);

      current = selectedIndex >= 0 ? selectedIndex : 0;
      renderPhoto();
    }

    function renderPhoto() {
      if (!photos.length) return;

      const item = photos[current];
      document.getElementById("mainPhoto").style.opacity = 0;

      setTimeout(() => {
        document.getElementById("mainPhoto").src = item.image;
        document.getElementById("title").textContent = item.title || "";
        document.getElementById("caption").textContent = item.caption || "";
        document.getElementById("mainPhoto").style.opacity = 1;
      }, 180);
    }

    function nextPhoto() {
      current = (current + 1) % photos.length;
      renderPhoto();
    }

    function prevPhoto() {
      current = (current - 1 + photos.length) % photos.length;
      renderPhoto();
    }

    loadPhotos().catch(() => {
      document.getElementById("title").textContent = "照片載入失敗";
      document.getElementById("caption").textContent = "請確認 photos.json 和照片路徑是否正確。";
    });
  </script>
</body>
</html>
